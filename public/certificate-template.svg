<svg width="1200" height="850" viewBox="0 0 1200 850" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="850" fill="#FFFFFF"/>
  
  <!-- Border -->
  <rect x="40" y="40" width="1120" height="770" fill="none" stroke="#1a1a1a" stroke-width="3"/>
  <rect x="50" y="50" width="1100" height="750" fill="none" stroke="#1a1a1a" stroke-width="1"/>
  
  <!-- Decorative corners -->
  <circle cx="80" cy="80" r="15" fill="none" stroke="#1a1a1a" stroke-width="2"/>
  <circle cx="1120" cy="80" r="15" fill="none" stroke="#1a1a1a" stroke-width="2"/>
  <circle cx="80" cy="770" r="15" fill="none" stroke="#1a1a1a" stroke-width="2"/>
  <circle cx="1120" cy="770" r="15" fill="none" stroke="#1a1a1a" stroke-width="2"/>
  
  <!-- Title -->
  <text x="600" y="150" font-family="serif" font-size="48" font-weight="bold" fill="#1a1a1a" text-anchor="middle">CERTIFICATE OF ACHIEVEMENT</text>
  
  <!-- Subtitle -->
  <text x="600" y="200" font-family="sans-serif" font-size="20" fill="#666666" text-anchor="middle">This is to certify that</text>
  
  <!-- Name placeholder line -->
  <line x1="300" y1="330" x2="900" y2="330" stroke="#1a1a1a" stroke-width="2"/>
  
  <!-- Description -->
  <text x="600" y="400" font-family="sans-serif" font-size="18" fill="#333333" text-anchor="middle">has successfully participated in</text>
  
  <!-- Event name -->
  <text x="600" y="470" font-family="serif" font-size="36" font-weight="bold" fill="#1a1a1a" text-anchor="middle">TechFest 2026</text>
  
  <!-- Additional text -->
  <text x="600" y="530" font-family="sans-serif" font-size="16" fill="#666666" text-anchor="middle">held on March 9, 2026</text>
  
  <!-- Signature section -->
  <line x1="200" y1="680" x2="450" y2="680" stroke="#1a1a1a" stroke-width="1"/>
  <text x="325" y="710" font-family="sans-serif" font-size="14" fill="#666666" text-anchor="middle">Authorized Signature</text>
  
  <line x1="750" y1="680" x2="1000" y2="680" stroke="#1a1a1a" stroke-width="1"/>
  <text x="875" y="710" font-family="sans-serif" font-size="14" fill="#666666" text-anchor="middle">Date</text>
</svg>
